<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    
    <!-- Primary Meta Tags -->
    <title>TheChatFlow - Pakistan's #1 WhatsApp Business Automation Platform</title>
    <meta name="title" content="TheChatFlow - Pakistan's #1 WhatsApp Business Automation Platform" />
    <meta name="description" content="Automate your WhatsApp business with AI-powered chat solutions. Transform customer conversations into sales with Pakistan's leading WhatsApp automation platform. Start your free consultation today!" />
    <meta name="keywords" content="WhatsApp automation, WhatsApp Business API, chatbot Pakistan, customer service automation, lead generation, business automation, AI chatbot, WhatsApp marketing" />
    <meta name="author" content="TheChatFlow Pakistan" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://thechatflow.com" />
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Optimized Google Fonts with font-display: swap -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thechatflow.com" />
    <meta property="og:title" content="TheChatFlow - WhatsApp Business Automation Pakistan" />
    <meta property="og:description" content="Transform customer conversations into sales with Pakistan's #1 WhatsApp automation platform. AI-powered chatbots for lead generation and customer support." />
    <meta property="og:image" content="https://thechatflow.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_PK" />
    <meta property="og:site_name" content="TheChatFlow" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thechatflow.com" />
    <meta property="twitter:title" content="TheChatFlow - WhatsApp Business Automation Pakistan" />
    <meta property="twitter:description" content="Transform customer conversations into sales with Pakistan's #1 WhatsApp automation platform." />
    <meta property="twitter:image" content="https://thechatflow.com/og-image.jpg" />
    <meta name="twitter:creator" content="@thechatflow" />
    
    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TheChatFlow",
      "url": "https://thechatflow.com",
      "logo": "https://thechatflow.com/logo.png",
      "description": "Pakistan's leading WhatsApp business automation platform providing AI-powered chatbots for customer service and lead generation.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Lahore",
        "addressCountry": "PK"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+92-340-4634191",
        "contactType": "customer service",
        "email": "hello@thechatflow.com"
      },
      "sameAs": [
        "https://www.facebook.com/thechatflow",
        "https://www.instagram.com/thechatflow",
        "https://www.linkedin.com/company/thechatflow"
      ]
    }
    </script>
    
    <!-- Service Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "WhatsApp Business Automation",
      "description": "AI-powered WhatsApp automation services for Pakistani businesses including chatbot development, lead generation, and customer support automation.",
      "provider": {
        "@type": "Organization",
        "name": "TheChatFlow"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Pakistan"
      },
      "serviceType": "Business Process Automation"
    }
    </script>
    
    <!-- Performance optimizations -->
    <link rel="preload" href="/src/index.css" as="style">
    <link rel="modulepreload" href="/src/main.tsx">
    
    <!-- Favicon and icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#25D366" />
    <meta name="msapplication-TileColor" content="#25D366" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
