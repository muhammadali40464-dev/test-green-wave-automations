    <!-- Critical CSS - Above the fold styles for LCP optimization -->
    <style>
      /* Critical CSS variables */
      :root {
        --background: 0 0% 100%;
        --foreground: 210 22% 22%;
        --whatsapp-green: 142 70% 49%;
        --whatsapp-dark: 174 76% 30%;
        --whatsapp-teal: 174 84% 20%;
        --primary: 142 70% 49%;
        --primary-foreground: 0 0% 100%;
        --muted-foreground: 215 16% 47%;
      }
      
      /* Critical base styles */
      *{box-sizing:border-box;}
      body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;line-height:1.6;background-color:hsl(var(--background));}
      
      /* Critical hero styles for LCP element */
      .font-hero{
        font-size:3.75rem;
        font-weight:700;
        line-height:1.1;
        letter-spacing:-0.025em;
      }
      @media (min-width: 768px){
        .font-hero{font-size:4.5rem;}
      }
      @media (min-width: 1024px){
        .font-hero{font-size:6rem;}
      }
      
      /* Critical text styles */
      .text-foreground{color:hsl(var(--foreground));}
      .leading-\\[0\\.95\\]{line-height:0.95;}
      .tracking-tight{letter-spacing:-0.025em;}
      .block{display:block;}
      
      /* Critical gradient styles */
      .bg-gradient-to-r{background-image:linear-gradient(to right,var(--tw-gradient-stops));}
      .from-whatsapp-green{--tw-gradient-from:hsl(var(--whatsapp-green));--tw-gradient-to:transparent;--tw-gradient-stops:var(--tw-gradient-from), var(--tw-gradient-to);}
      .via-whatsapp-dark{--tw-gradient-to:transparent;--tw-gradient-stops:var(--tw-gradient-from), hsl(var(--whatsapp-dark)), var(--tw-gradient-to);}
      .to-whatsapp-teal{--tw-gradient-to:hsl(var(--whatsapp-teal));}
      .bg-clip-text{-webkit-background-clip:text;background-clip:text;}
      .text-transparent{color:transparent;}
      
      /* Critical animation - optimized for LCP */
      .animate-fade-in-up{animation:fade-in-up 0.6s ease-out forwards;}
      @keyframes fade-in-up{
        from{opacity:0;transform:translateY(15px);}
        to{opacity:1;transform:translateY(0);}
      }
      
      /* Critical layout styles */
      .hero-section{min-height:100vh;display:flex;align-items:center;}
      .container-width{max-width:1200px;margin:0 auto;padding:0 1rem;}
      .section-padding{padding:4rem 0;}
      .grid{display:grid;}
      .lg\\:grid-cols-2{grid-template-columns:1fr;}
      @media (min-width: 1024px){
        .lg\\:grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr));}
      }
      .gap-16{gap:4rem;}
      .items-center{align-items:center;}
      .space-y-8>*+*{margin-top:2rem;}
      .space-y-6>*+*{margin-top:1.5rem;}
      .space-y-4>*+*{margin-top:1rem;}
    </style>

    <!-- Performance optimizations - Eliminate render blocking CSS -->
    <script>
      // Load CSS asynchronously to prevent render blocking
      const loadCSS = (href, before, media, callback) => {
        const doc = window.document;
        const ss = doc.createElement('link');
        let ref;
        if (before) {
          ref = before;
        } else {
          const refs = (doc.body || doc.getElementsByTagName('head')[0]).childNodes;
          ref = refs[refs.length - 1];
        }
        const sheets = doc.styleSheets;
        ss.rel = 'stylesheet';
        ss.href = href;
        ss.media = 'only x';
        if (callback) {
          ss.addEventListener('load', callback);
        }
        ref.parentNode.insertBefore(ss, before ? ref : ref.nextSibling);
        const toggleMedia = () => {
          let defined;
          for (let i = 0; i < sheets.length; i++) {
            if (sheets[i].href && sheets[i].href.indexOf(href) > -1) {
              defined = true;
            }
          }
          if (defined) {
            ss.media = media || 'all';
          } else {
            setTimeout(toggleMedia);
          }
        };
        toggleMedia();
        return ss;
      };

      // Load main stylesheet after critical path
      loadCSS('/src/index.css');
    </script>
